<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4a90d9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HelloPWA">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="manifest" href="/static/manifest.json">
  <title>Hello World PWA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      color: #1a202c;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 3rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 { font-size: 2rem; color: #4a90d9; margin-bottom: 0.5rem; }
    p  { color: #718096; margin-bottom: 1.5rem; line-height: 1.6; }
    .status {
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      background: #ebf8ff;
      color: #2b6cb0;
      display: inline-block;
    }
    .status.offline { background: #fff5f5; color: #c53030; }
    #install-btn, #notify-btn {
      display: none;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
    #install-btn:hover, #notify-btn:hover { background: #357abd; }
    #notify-btn:disabled { background: #a0aec0; cursor: default; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 10;
    }
    .modal-overlay .card { text-align: left; }
    .modal-overlay h2 { font-size: 1.3rem; color: #1a202c; margin-bottom: 1.25rem; }
    .habit-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.9rem;
      color: #4a5568;
      margin-bottom: 1rem;
    }
    .habit-field input, .habit-field textarea {
      font-size: 1rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-family: inherit;
      resize: vertical;
    }
    .habit-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
    .habit-actions button { flex: 1; padding: 0.75rem; border-radius: 8px; border: none; font-size: 1rem; cursor: pointer; }
    .habit-actions button[type="submit"] { background: #4a90d9; color: white; }
    .habit-actions button[type="submit"]:hover { background: #357abd; }
    .habit-actions button[type="submit"]:disabled { background: #a0aec0; cursor: default; }
    .habit-actions button#habit-skip-btn { background: #edf2f7; color: #4a5568; }
    .habit-actions button#habit-skip-btn:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World! Ayooooo</h1>
    <p>Using flask now ayooo... Your PWA scaffold is running. AYOOO<br>Install it to use it like a native app.</p>
    <span class="status" id="sw-status">Checking service worker…</span>
    <button id="install-btn">Add to Home Screen</button>
    <button id="notify-btn">Enable Notifications</button>
    <p id="habit-status" style="display:none; font-size:0.85rem; color:#718096; margin-top:0.75rem;">
      Today logged &#10003; &mdash; <a href="#" id="habit-edit-link">edit</a>
    </p>
  </div>

  <div class="modal-overlay" id="habit-modal">
    <div class="card">
      <h2>Daily check-in</h2>
      <form id="habit-form">
        <div id="habit-fields"></div>
        <div class="habit-actions">
          <button type="button" id="habit-skip-btn">Not now</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Service worker registration
    const swStatus = document.getElementById('sw-status');
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => { swStatus.textContent = 'Service worker active'; })
        .catch(() => { swStatus.textContent = 'Service worker failed'; swStatus.classList.add('offline'); });
    } else {
      swStatus.textContent = 'Service workers not supported';
      swStatus.classList.add('offline');
    }

    // Offline indicator
    function updateOnline() {
      swStatus.textContent = navigator.onLine ? 'Online' : 'Offline';
      swStatus.classList.toggle('offline', !navigator.onLine);
    }
    window.addEventListener('online', updateOnline);
    window.addEventListener('offline', updateOnline);

    // Install prompt
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });
    installBtn.addEventListener('click', () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { installBtn.style.display = 'none'; });
    });

    // Push notifications
    const notifyBtn = document.getElementById('notify-btn');

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
    }

    async function subscribeToPush() {
      notifyBtn.textContent = 'Checking service worker…';
      const registration = await navigator.serviceWorker.ready;

      notifyBtn.textContent = 'Fetching VAPID key…';
      const keyRes = await fetch('/api/vapid-public-key');
      if (!keyRes.ok) {
        throw new Error(`vapid-public-key returned ${keyRes.status}`);
      }
      const { publicKey } = await keyRes.json();

      notifyBtn.textContent = 'Subscribing…';
      const subscription = await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });

      notifyBtn.textContent = 'Registering with server…';
      const subRes = await fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(subscription)
      });
      if (!subRes.ok) {
        throw new Error(`/api/subscribe returned ${subRes.status}`);
      }
      notifyBtn.textContent = 'Notifications enabled';
      notifyBtn.disabled = true;
    }

    if ('serviceWorker' in navigator && 'PushManager' in window) {
      notifyBtn.style.display = 'block';
      notifyBtn.addEventListener('click', async () => {
        notifyBtn.textContent = 'Requesting permission…';
        let permission;
        try {
          permission = await Notification.requestPermission();
        } catch (err) {
          console.error('Permission request failed:', err);
          notifyBtn.textContent = 'Permission request failed';
          return;
        }
        if (permission !== 'granted') {
          notifyBtn.textContent = `Permission: ${permission} (tap to retry)`;
          return;
        }
        try {
          await subscribeToPush();
        } catch (err) {
          console.error('Push subscription failed:', err);
          notifyBtn.textContent = `Failed: ${err.message}`.slice(0, 60);
        }
      });
    }

    // Daily habit check-in prompt
    const habitModal = document.getElementById('habit-modal');
    const habitForm = document.getElementById('habit-form');
    const habitFieldsEl = document.getElementById('habit-fields');
    const habitSkipBtn = document.getElementById('habit-skip-btn');
    const habitSaveBtn = habitForm.querySelector('button[type="submit"]');
    const habitStatusEl = document.getElementById('habit-status');
    const habitEditLink = document.getElementById('habit-edit-link');
    let habitFieldsByKey = {};
    let habitFields = [];

    function renderHabitForm() {
      habitFieldsEl.innerHTML = habitFields.map(f => {
        const required = f.required !== false;
        const input = f.type === 'number'
          ? `<input name="${f.key}" type="number" step="any" ${required ? 'required' : ''}>`
          : `<textarea name="${f.key}" rows="3" ${required ? 'required' : ''}></textarea>`;
        return `<label class="habit-field">${f.label}${input}</label>`;
      }).join('');
    }

    async function initHabitPrompt() {
      try {
        const todayRes = await fetch('/api/habits/today');
        if (!todayRes.ok) return;
        const { logged } = await todayRes.json();

        const fieldsRes = await fetch('/api/habits/fields');
        if (!fieldsRes.ok) return;
        ({ fields: habitFields } = await fieldsRes.json());
        if (!habitFields.length) return;
        habitFieldsByKey = Object.fromEntries(habitFields.map(f => [f.key, f]));

        if (logged) {
          habitStatusEl.style.display = 'block';
          return;
        }

        renderHabitForm();
        habitModal.style.display = 'flex';
      } catch (err) {
        console.error('Habit prompt init failed:', err);
      }
    }

    habitEditLink.addEventListener('click', async e => {
      e.preventDefault();
      if (!confirm("Delete today's entry and re-enter it from scratch?")) return;
      try {
        const res = await fetch('/api/habits/today', { method: 'DELETE' });
        if (!res.ok) throw new Error(`delete failed: ${res.status}`);
        habitStatusEl.style.display = 'none';
        renderHabitForm();
        habitModal.style.display = 'flex';
      } catch (err) {
        console.error('Habit delete failed:', err);
      }
    });

    habitForm.addEventListener('submit', async e => {
      e.preventDefault();
      const metrics = {};
      for (const [key, value] of new FormData(habitForm).entries()) {
        const field = habitFieldsByKey[key];
        if (field.type === 'number') {
          metrics[key] = Number(value);
        } else if (value.trim() !== '') {
          metrics[key] = value;
        }
      }

      habitSaveBtn.disabled = true;
      habitSaveBtn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/habits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ metrics })
        });
        if (!res.ok) throw new Error(`save failed: ${res.status}`);
        habitModal.style.display = 'none';
      } catch (err) {
        console.error('Habit save failed:', err);
        habitSaveBtn.textContent = 'Failed, retry';
        habitSaveBtn.disabled = false;
      }
    });

    habitSkipBtn.addEventListener('click', () => { habitModal.style.display = 'none'; });

    initHabitPrompt();
  </script>
</body>
</html>
