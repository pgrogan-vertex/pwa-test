<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4a90d9">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <title>Log in</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      color: #1a202c;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem 3rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 100%;
    }
    h1 { font-size: 1.5rem; color: #4a90d9; margin-bottom: 1.5rem; text-align: center; }
    .error { color: #c53030; font-size: 0.85rem; margin-bottom: 1rem; text-align: center; }
    input[type="password"] {
      width: 100%;
      font-size: 1rem;
      padding: 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Log in</h1>
    <form method="post">
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <input type="password" name="password" placeholder="Password" autofocus required>
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
